name: Deploy to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      invalidate_cache:
        description: "Invalidate CloudFront cache after deploy"
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-1
      S3_BUCKET: s3://move2cloud.tn

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GithubRunnerRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Upload HTML, JSON, txt, xml with short cache
          aws s3 sync . ${{ env.S3_BUCKET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "terraform/*" \
            --exclude "README.md" \
            --exclude ".gitignore" \
            --exclude "amplify.yml" \
            --exclude "_redirects" \
            --exclude "assets/*" \
            --cache-control "public, max-age=3600, must-revalidate"

          # Upload static assets with long cache (content-hashed in practice)
          aws s3 sync assets/ ${{ env.S3_BUCKET }}/assets/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront cache
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' && (github.event_name == 'push' || inputs.invalidate_cache == true) }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
